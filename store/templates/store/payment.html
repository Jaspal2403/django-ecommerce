<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Payment | PreetCraft Studio</title>

{% load static %}

<link rel="stylesheet" href="{% static 'store/css/style.css' %}">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body class="payment-page">

<div class="payment-wrapper">
    <div class="payment-card">

        <div class="loader"></div>

        <div class="brand">PreetCraft Studio</div>

        <p class="subtitle">
            Redirecting to secure Razorpay checkout
        </p>

        <div class="amount-box">
            <div class="amount-label">Payable Amount</div>
            <div class="amount">
                <!-- ₹ {{ amount|floatformat:0|add:"0" }} -->
                 {{ display_amount }}
            </div>
        </div>

        <button class="btn btn-pay" onclick="openPayment()">
            Proceed to Pay
        </button>

        <button class="btn btn-cancel" onclick="goHome()">
            Cancel Payment
        </button>

        <p class="small-text">
            100% Secure Payment via Razorpay
        </p>

    </div>
</div>

<script>

const options = {
    key: "{{ razorpay_key }}",
    amount: parseInt("{{ amount }}"),   // paise
    currency: "INR",
    name: "PreetCraft Studio",
    description: "Purchase Payment",
    order_id: "{{ order_id }}",

    method: {
        upi: true,
        card: true,
        netbanking: true
    },

    handler: function(response){

        fetch("{% url 'store:payment_success' %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                //"X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify(response)
        })

        .then(res => {
            if(!res.ok){
                throw new Error("Server error");
            }
            return res.json();
        })

        .then(data => {

            if(data.status === "success"){
                window.location.href =
                "{% url 'store:payment_success_page' %}?order_id=" +
                response.razorpay_order_id;
            } else {
                alert("Payment verification failed: " + (data.message || "Unknown error"));
            }

        })

        .catch(error => {
            alert("Payment processed but verification failed.");
            console.log(error);
        });
    },

    modal: {
        ondismiss: function(){
            window.location.href = "{% url 'store:home' %}";
        }
    },

    theme: {
        color: "#f59e0b"
    },

    prefill: {
        name: "{{ request.user.get_full_name }}",
        email: "{{ request.user.email }}",
        contact: "{{ request.user.profile.phone_number }}"
    },

    notes: {
        address: "PreetCraft Studio"
    }
};

const rzp = new Razorpay(options);

rzp.on('payment.failed', function (response){
    alert("Payment Failed: " + response.error.description);
});

let paymentOpened = false;

function openPayment(){
    if (paymentOpened) return;

    paymentOpened = true;
    rzp.open();
}

function goHome(){
    window.location.href = "{% url 'store:home' %}";
}

/* Auto open only once */
window.onload = function(){
    setTimeout(function(){
        openPayment();
    }, 700);
};

</script>

</body>
</html>
