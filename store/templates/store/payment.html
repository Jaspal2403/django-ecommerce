<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | PreetCraft Studio</title>

    {% load static %}

    <link rel="stylesheet" href="{% static 'store/css/style.css' %}">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body class="payment-page">

<div class="payment-wrapper">

    <div class="payment-card">

        <div class="loader"></div>

        <div class="brand">PreetCraft Studio</div>

        <p class="subtitle">
            Redirecting to secure Razorpay checkout
        </p>

        <div class="amount-box">
            <div class="amount-label">Payable Amount</div>
            <div class="amount">₹ {{ amount|floatformat:2 }}</div>
        </div>

        <button class="btn btn-pay" onclick="openPayment()">
            Proceed to Pay
        </button>

        <button class="btn btn-cancel" onclick="goHome()">
            Cancel Payment
        </button>

        <p class="small-text">
            100% Secure Payment via Razorpay
        </p>

    </div>

</div>

<script>
const options = {
    key: "{{ razorpay_key }}",
    amount: parseInt("{{ amount }}"),
    currency: "INR",
    name: "PreetCraft Studio",
    description: "Purchase Payment",
    order_id: "{{ order_id }}",

    method: {
        card: true,
        upi: true,
        netbanking: true,
        wallet: true
    },

    handler: function(response){

        fetch("/payment-success-api/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify(response)
        })
        .then(res => res.json())
        .then(data => {

            if(data.status === "success"){
                window.location.href =
                "/payment-success/?order_id=" +
                response.razorpay_order_id;
            }else{
                alert("Payment verification failed.");
            }

        })
        .catch(error => {
            alert("Something went wrong.");
        });
    },

    modal: {
        ondismiss: function(){
            window.location.href = "/";
        }
    },

    theme: {
        color: "#f59e0b"
    }
};

const rzp = new Razorpay(options);

function openPayment(){
    rzp.open();
}

function goHome(){
    window.location.href = "/";
}

window.onload = function(){
    setTimeout(function(){
        rzp.open();
    }, 700);
};
</script>

</body>
</html>
