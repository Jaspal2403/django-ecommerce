{% extends "store/auth_base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="row justify-content-center align-items-center auth-page-row">

    <div class="col-xl-4 col-lg-5 col-md-6">

        <div class="card shadow-lg border-0 auth-card">

            <div class="card-body auth-card-body p-4">

                <!-- Heading -->
                <h3 class="text-center auth-title mb-4">
                    Login
                </h3>

                <!-- Errors -->
                {% if form.errors %}
                <div class="alert alert-danger">
                    Invalid username or password.
                </div>
                {% endif %}

                <!-- Form -->
                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            Username
                        </label>
                        {{ form.username }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            Password
                        </label>
                        {{ form.password }}
                    </div>

                    <button type="submit"
                            class="btn btn-primary w-100 auth-btn">
                        Sign In
                    </button>

                </form>

                <!-- Bottom -->
                <div class="auth-bottom-text mt-4">

                    Don’t have an account?

                    <a href="{% url 'store:signup' %}">
                        Create Account
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
