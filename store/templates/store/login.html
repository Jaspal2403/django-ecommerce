{% extends "store/auth_base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="row justify-content-center align-items-center auth-page-row">
    <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-4 auth-card-body">

                <h3 class="text-center mb-4 auth-title">Login</h3>

                {% if form.errors %}
                    <div class="alert alert-danger">
                        Invalid username or password.
                    </div>
                {% endif %}

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        {{ form.username }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        {{ form.password }}
                    </div>

                    <button type="submit" class="btn btn-primary w-100 auth-btn">
                       Login
                    </button>
                </form>

            </div>
        </div>
    </div>
</div>

{% endblock %}
