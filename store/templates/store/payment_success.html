<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Payment Success</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:#f8f9fa;
}

.success-wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.success-card{
    background:#fff;
    border-radius:18px;
    box-shadow:0 12px 30px rgba(0,0,0,.08);
    padding:30px;
    width:100%;
    max-width:520px;
}

.success-title{
    color:#198754;
    font-weight:800;
    text-align:center;
    margin-bottom:24px;
}

.success-row{
    padding:10px 0;
    border-bottom:1px solid #eee;
}

.store-btn{
    display:block;
    text-align:center;
    text-decoration:none;
    margin-top:22px;
    background:#0d6efd;
    color:#fff;
    padding:12px;
    border-radius:12px;
    font-weight:700;
}

.store-btn:hover{
    color:#fff;
}

@media(max-width:576px){
    .success-card{
        padding:22px;
    }

    .success-title{
        font-size:24px;
    }
}
</style>

</head>
<body>

<div class="success-wrap">

<div class="success-card">

<h2 class="success-title">✅ Payment Successful</h2>

{% if payment %}

<div class="success-row">
<strong>Order ID:</strong> {{ payment.razorpay_order_id }}
</div>

<div class="success-row">
<strong>Payment ID:</strong> {{ payment.razorpay_payment_id }}
</div>

<div class="success-row">
<strong>Amount:</strong> ₹{{ payment.amount_in_rupees }}
</div>

<div class="success-row border-0">
<strong>Status:</strong> {{ payment.status }}
</div>

{% else %}

<p class="text-center mb-0">Payment details not found.</p>

{% endif %}

<a href="/" class="store-btn">Go to Store</a>

</div>
</div>

</body>
</html>
