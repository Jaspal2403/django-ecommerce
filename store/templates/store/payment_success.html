<!DOCTYPE html>
<html>
<head>
    <title>Payment Success</title>
</head>
<body>

<h2>✅ Payment Successful</h2>

{% if payment %}

<p><strong>Order ID:</strong> {{ payment.razorpay_order_id }}</p>
<p><strong>Payment ID:</strong> {{ payment.razorpay_payment_id }}</p>
<p><strong>Amount:</strong> ₹{{ payment.amount_in_rupees }}</p>
<p><strong>Status:</strong> {{ payment.status }}</p>

{% else %}
<p>Payment details not found.</p>
{% endif %}

<a href="/">Go to Store</a>

</body>
</html>
